name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:                                                       
    name: Build rBank APK
    runs-on: ubuntu-latest
                                                               
    steps:
      - name: Checkout repozitáře
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
                                                               
      - name: Instalace NPM závislostí
        run: npm install

      - name: Sestavení produkčního Vite buildu
        run: npm run build

      - name: Synchronizace Capacitor platformy
        run: npx cap sync android

      - name: Generování nativních Android ikon
        run: |
          sudo apt-get update && sudo apt-get install -y webp
          mkdir -p assets
          dwebp public/logo.webp -o assets/icon.png
          npm install -g @capacitor/assets
          npx capacitor-assets generate --android

      - name: Nastavení Java 17 JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Oprávnění ke spuštění Gradle wrapperu
        working-directory: ./android
        run: chmod +x gradlew

      - name: Aktualizace Gradle na v8.7 (Oprava bugu s bcprov jar)
        working-directory: ./android
        run: ./gradlew wrapper --gradle-version 8.7

      - name: Nativní sestavení APK přes Gradle
        working-directory: ./android
        run: ./gradlew clean assembleDebug --no-daemon --stacktrace

      - name: Publikace APK jako artefaktu
        uses: actions/upload-artifact@v4
        with:
          name: rBank-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
