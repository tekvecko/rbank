name: Build Android APK

on:
  push:
    branches: [ main ]
  # Umožňuje spustit build i manuálně z webu GitHubu
  workflow_dispatch: 

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Získání zdrojových kódů
        uses: actions/checkout@v4

      - name: Nastavení Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalace NPM závislostí
        run: npm install

      - name: Build webové aplikace (Vite)
        run: npm run build

      - name: Synchronizace do Capacitoru
        run: npx cap sync android

      - name: Nastavení Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Povolení spouštění Gradle
        run: chmod +x android/gradlew

      - name: Sestavení APK (Debug)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Nahrání hotového APK
        uses: actions/upload-artifact@v4
        with:
          name: rBank-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
